<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Success - Pizza Haven</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <i class="fas fa-pizza-slice"></i>
                <span>Pizza Haven</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="menu.html">Menu</a>
                <a href="cart.html">Cart <span id="cartCount" class="cart-badge">0</span></a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="success-container">
                <div class="success-card">
                    <i class="fas fa-check-circle"></i>
                    <h2>Order Placed Successfully!</h2>
                    <p>Thank you for ordering from Pizza Haven. Your pizza will be delivered within 30-45 minutes.</p>
                    <div class="order-details" id="orderDetails"></div>
                    <div class="success-buttons">
                        <a href="menu.html" class="btn btn-primary">Order More</a>
                        <a href="index.html" class="btn btn-secondary">Go to Home</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/common.js"></script>
    <script src="js/order.js"></script>
</body>
</html>
